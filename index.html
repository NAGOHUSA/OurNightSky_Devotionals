<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Night Sky · Celestial Devotionals</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root {
  --bg: #070910;
  --bg2: #0d1117;
  --panel: rgba(13,18,28,0.85);
  --border: rgba(140,170,220,0.12);
  --accent: #4a7fff;
  --accent2: #7eb8ff;
  --gold: #e8c97a;
  --gold2: #f5dfa0;
  --text: #d4ddf0;
  --text3: #5a6a88;
  --mono: 'JetBrains Mono', monospace;
  --cond: 'Barlow Condensed', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: var(--bg); color: var(--text); font-family: var(--mono); scroll-behavior: smooth; }
body { min-height: 100vh; }

/* STAR FIELD */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(1.5px 1.5px at 12% 8%, rgba(200,220,255,0.7) 0%, transparent 100%),
              radial-gradient(1px 1px at 34% 22%, rgba(200,220,255,0.5) 0%, transparent 100%),
              radial-gradient(2px 2px at 78% 6%, rgba(200,220,255,0.4) 0%, transparent 100%);
}

.wrap { max-width: 980px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; position: relative; z-index: 2; }

/* ── HEADER ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  padding-bottom: 1rem; margin-bottom: 2rem;
}
.logo-wordmark { font-family: var(--cond); font-size: 1.6rem; font-weight: 700; text-transform: uppercase; color: var(--gold2); }
.logo-tag { font-family: var(--mono); font-size: 0.65rem; color: var(--text3); text-transform: uppercase; }

/* ── THREE COLUMNS ── */
.three-col { display: grid; grid-template-columns: 220px 1fr 210px; gap: 1.5rem; align-items: start; }
@media (max-width: 860px) { .three-col { grid-template-columns: 1fr; } }

.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; backdrop-filter: blur(8px); margin-bottom: 1.2rem; }
.panel-header { display: flex; align-items: center; gap: 8px; padding: 0.6rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: var(--text3); }

/* ── IMAGE AREA ── */
#spaceContent { min-height: 200px; }
#spaceContent img { width: 100%; height: auto; display: block; border-bottom: 1px solid var(--border); }
.space-info { padding: 0.8rem 1rem; font-size: 0.7rem; }
.space-title { color: var(--gold); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
.space-desc { color: var(--text3); font-size: 0.58rem; line-height: 1.4; }

/* ── DEVOTIONAL ── */
.date-big { font-family: var(--cond); font-size: 3.2rem; font-weight: 700; color: var(--gold2); }
.date-month-year { font-size: 0.65rem; text-transform: uppercase; color: var(--text3); }
.devot-title { font-family: var(--cond); font-size: 2.1rem; font-weight: 700; color: var(--gold2); text-transform: uppercase; margin-bottom: 1.2rem; }
.scripture-block { border-left: 3px solid var(--accent); padding: 0.8rem 1rem; background: rgba(74,127,255,0.06); font-size: 0.82rem; font-style: italic; margin-bottom: 1.2rem; }
.section-head { font-size: 0.58rem; text-transform: uppercase; color: var(--text3); font-weight: 700; margin-bottom: 0.5rem; }
.body-text { font-size: 0.82rem; line-height: 1.75; margin-bottom: 1.2rem; }
.prayer-block { background: rgba(126,184,255,0.05); border: 1px solid rgba(126,184,255,0.15); padding: 1rem; border-radius: 4px; }

/* ── ARCHIVE ── */
.archive-entry { padding: 0.45rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 0.65rem; transition: 0.2s; }
.archive-entry:hover { color: var(--accent2); background: rgba(255,255,255,0.05); }

.loader-state { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: var(--text3); padding: 2rem 1.5rem; }
.spinner { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="stars"></div>
<div class="wrap">

  <div class="site-header">
    <div class="logo-block">
      <div class="logo-wordmark">OurNightSky</div>
      <div class="logo-tag">Celestial Devotionals</div>
    </div>
    <div class="logo-tag">ournightsky.us</div>
  </div>

  <div class="three-col">
    <!-- LEFT -->
    <div class="sidebar-left">
      <div class="panel">
        <div class="panel-header">TODAY</div>
        <div style="padding: 1rem;">
          <div class="date-big" id="dayNum">--</div>
          <div class="date-month-year" id="monthYear">--- ----</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">CELESTIAL INDEX</div>
        <div style="padding: 0.5rem 1rem; font-size: 0.7rem;">
          <div style="display:flex; justify-content:space-between; padding: 4px 0; border-bottom: 1px solid var(--border);">
            <span style="color:var(--text3)">Moon</span><span id="moonPhase" style="color:var(--gold)">--</span>
          </div>
          <div style="display:flex; justify-content:space-between; padding: 4px 0;">
            <span style="color:var(--text3)">Archive</span><span id="archiveCount" style="color:var(--gold)">--</span>
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main-col">
      <div class="panel" style="overflow: hidden;">
        <div class="panel-header">Celestial Gallery</div>
        <div id="spaceContent">
          <div class="loader-state"><i class="fas fa-circle-notch spinner"></i>&nbsp;Searching the stars...</div>
        </div>
      </div>

      <div class="panel" style="padding: 1.5rem;" id="devotionalPanel">
        <div class="loader-state"><i class="fas fa-circle-notch spinner"></i>&nbsp;Loading meditation...</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="sidebar-right">
      <div class="panel">
        <div class="panel-header">ARCHIVE</div>
        <div id="archiveList" class="archive-list-inner"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const GITHUB_RAW = 'https://raw.githubusercontent.com/NAGOHUSA/OurNightSky_Devotionals/main/devotionals/';
  const GITHUB_API = 'https://api.github.com/repos/NAGOHUSA/OurNightSky_Devotionals/contents/devotionals';

  // --- NASA IMAGE LIBRARY SOURCE ---
  async function loadSpaceImagery() {
    const target = document.getElementById('spaceContent');
    const queries = ['Nebula', 'Hubble Galaxy', 'Deep Space', 'Star Cluster'];
    // Use the day of the month to pick a search term and an image index
    const day = new Date().getDate();
    const query = queries[day % queries.length];
    
    try {
      const resp = await fetch(`https://images-api.nasa.gov/search?q=${query}&media_type=image`);
      const data = await resp.json();
      const items = data.collection.items;
      
      // Use day to pick a semi-random image from the results
      const pick = items[day % Math.min(items.length, 20)];
      const imgUrl = pick.links[0].href;
      const title = pick.data[0].title;
      const description = pick.data[0].description ? pick.data[0].description.substring(0, 150) + '...' : 'NASA imagery library.';

      target.innerHTML = `
        <img src="${imgUrl}" alt="${title}">
        <div class="space-info">
          <div class="space-title">${title}</div>
          <div class="space-desc">${description}</div>
        </div>`;
    } catch (e) {
      target.innerHTML = `<div class="error-state" style="padding:2rem; text-align:center; color:var(--text3);">Gallery offline.</div>`;
    }
  }

  // --- RESTORED ORIGINAL DEVOTIONAL LOGIC ---
  function renderDevotional(data, dateStr) {
    const panel = document.getElementById('devotionalPanel');
    if (!data) {
      panel.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--text3);">No devotional for this date.</div>`;
      return;
    }
    
    let title = data.title || "Celestial Reflection";
    let scripture = data.scripture || "";
    let reflection = data.reflection || "";
    let prayer = data.prayer || "";

    if (data.content_markdown) {
      const md = data.content_markdown;
      const mS = md.match(/## Scripture\n([\s\S]*?)(?=\n## |$)/i);
      if (mS) scripture = mS[1].trim();
      const mR = md.match(/## Reflection\n([\s\S]*?)(?=\n## |$)/i);
      if (mR) reflection = mR[1].trim();
      const mP = md.match(/## Prayer\n([\s\S]*?)$/i);
      if (mP) prayer = mP[1].trim();
    }

    panel.innerHTML = `
      <div class="devot-title">${title}</div>
      ${scripture ? `<div class="scripture-block">${scripture}</div>` : ''}
      <div class="section-head">REFLECTION</div>
      <div class="body-text">${reflection.replace(/\n/g, '<br>')}</div>
      <div class="prayer-block"><div class="section-head">PRAYER</div><div class="body-text" style="margin:0;">${prayer.replace(/\n/g, '<br>')}</div></div>
    `;
  }

  async function loadToday() {
    const today = new Date().toISOString().slice(0, 10);
    try {
      const r = await fetch(GITHUB_RAW + today + '.json');
      renderDevotional(await r.json(), today);
    } catch { renderDevotional(null, today); }
  }

  async function loadArchive() {
    try {
      const r = await fetch(GITHUB_API);
      const files = await r.json();
      const archive = files.filter(f => f.name.endsWith('.json')).reverse();
      document.getElementById('archiveCount').textContent = archive.length;
      document.getElementById('archiveList').innerHTML = archive.slice(0,10).map(f => `<div class="archive-entry" onclick="loadArchiveItem('${f.download_url}', '${f.name}')">${f.name.replace('.json','')}</div>`).join('');
    } catch (e) {}
  }

  window.loadArchiveItem = async (url, name) => {
    const r = await fetch(url);
    renderDevotional(await r.json(), name);
    window.scrollTo({top: 0});
  };

  function init() {
    const d = new Date();
    document.getElementById('dayNum').textContent = String(d.getDate()).padStart(2, '0');
    document.getElementById('monthYear').textContent = d.toLocaleDateString('en-US', { month: 'long' }).toUpperCase() + ' ' + d.getFullYear();
    loadSpaceImagery();
    loadToday();
    loadArchive();
  }
  init();
</script>
</body>
</html>
